name: Lint

on:
  workflow_call:

permissions:
  contents: read

jobs:
  golangci-lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    - uses: golangci/golangci-lint-action@v7
      with:
        version: v2.11.4
        args: --config ${{ github.workspace }}/.golangci.yml
